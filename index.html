<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulation</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div id="app" class="container">
      <div class="grid bg-sky-500 p-5 m-5 rounded">
        <div class="flex-col gap-5">
          <h1 class="text-center text-white text-xl mb-3">Learn - MovieOpedia</h1>
          <hr>
        </div>
        <div class="grid gap-5 mt-5">
          <div class="flex gap-2">
            <span class="text-white text-lg">Title</span>
            <input type="text" class="bg-gray-200 w-full rounded outline-none px-2 text-base" v-model="newMovie.title">
          </div>
          <div class="flex gap-2">
            <span class="text-white text-lg">Year</span>
            <input type="text" class="bg-gray-200 w-full rounded outline-none px-2 text-base" v-model="newMovie.year">
          </div>
          <div class="flex gap-3 justify-center">
            <button class="bg-gray-500 p-3 rounded" @click="addMovie()">Add Movie</button>
            <button class="bg-red-500 p-3 rounded" @click="deleteMovie()">Delete Movie</button>
          </div>
          <div class="border border-gray-400 p-3">
            <h4 class="text-center text-xl text-white mb-2">Movie List</h4>
            <hr>
            <h4 class="text-center text-red-600" v-if="showMessage">You can only add 5 movies</h4>
            <ul class="bg-gray-100 text-center mt-2">
              <li v-for="movie in getAllMovies">
                {{movie}}
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      const {createApp, ref, reactive, computed, watch} = Vue;

      createApp({
        setup(){
          let movies =  reactive([
            {title: "Movie 1", year: 2000},
            {title: "Movie 2", year: 2001},
            {title: "Movie 3", year: 2002},
          ]);

          let newMovie = reactive({title: "", year: ""});
          let showMessage = ref(false);

          watch(movies, ()=>{
            if(movies.length >= 3){
              showMessage.value = true;
            }else{
              showMessage.value = false;
            }
          });

          function addMovie(){
            if(movies.length < 5){
              movies.push({title: newMovie.title, year:newMovie.year});
              newMovie.title = "";
              newMovie.year = "";
            }
          }

          function deleteMovie(){
            movies.pop();
          }

          const getAllMovies = computed(()=>{
            return movies.map((movie)=>{
              return `${movie.title} release in ${movie.year}`;
            })
          });
            
          return{
           newMovie, 
           movies,
           addMovie,
           deleteMovie,
           getAllMovies,
           showMessage
          };
        }
      }).mount('#app');
    </script>
  </body>
</html>
