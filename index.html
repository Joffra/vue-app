<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulation</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
   <div id="app" class="container">
      <div class=" bg-sky-400 p-5 m-6 rounded">
        <div class="">
          <h3 class="text-white text-xl mb-2 text-center">Learn Vue - MovieOpedia</h3>
          <hr>
        </div>
        <div class="grid gap-2 mt-3">
          <div class="flex gap-2">
            <span class="text-base">Title</span>
            <input type="text" v-model="newMovie.title" class="bg-gray-200 rounded outline-none w-full px-2">
          </div>
          <div class="flex gap-2">
            <span class="text-base">Year</span>
            <input type="text" v-model="newMovie.year" class="bg-gray-200 rounded outline-none w-full px-2">
          </div>
        </div>
        <div class="flex gap-4 justify-center mt-5">
          <button class="bg-gray-500 text-base rounded p-2 cursor-pointer" @click="addMovie()">Add Movie</button>
          <button class="bg-red-500 text-base rounded p-2 cursor-pointer" @click="deleteMovie()">Delete Movie</button>
        </div>
        <div class="border-gray-600 border border-gray-600 mt-5 p-2">
          <h2 class="text-center text-lg text-white m-2">Movie List</h2>
          <hr>
          <h4 class="text-center text-red-300" v-if="showMessage">
            You can only add 5 movies
          </h4>
          <ul class="text-center m-2 bg-gray-200">
            <li v-for="movie in getAllMovie">
              {{movie}}
            </li>
          </ul>
        </div>
      </div>
   </div>

    <script>
      const {createApp, ref, reactive, computed, watch} = Vue;

      createApp({
        setup(){
            let movies = reactive([
              {title: "Movie 1", year: 2000},
              {title: "Movie 2", year: 2001},
              {title: "Movie 3", year: 2002},
            ]);

            let newMovie = reactive({title: "", year: ""});
            let showMessage = ref(false);

            function addMovie(){
              if(movies.length < 5){
                movies.push({title: newMovie.title, year: newMovie.year});
                newMovie.title = "";
                newMovie.year = "";
              }
            }

            const getAllMovie = computed(()=>{
              return movies.map((movie)=>{
                return `${movie.title} was release in ${movie.year}`;
              });
            });

            watch(movies, ()=>{
              if(movies.length >= 3){
                showMessage.value = true;
              }else{
                showMessage.value = false;
              }
            });

            function deleteMovie(){
              movies.pop();
            }
          return{
            newMovie, 
            movies, 
            addMovie, 
            deleteMovie, 
            getAllMovie,
            showMessage,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
